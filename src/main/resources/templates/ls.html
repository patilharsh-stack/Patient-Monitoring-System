<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
<head>
	<title>Styled Link as Button</title>
	<link rel="stylesheet" href="ls.css">
	  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	
</head>

<body>
<h1><a href="/" class="icon"><i class="fa fa-home"></i></a>   You are Sucessfully loggedin Please proceed with appointment</h1>
<form action="/appointment" method="post">
 
  <label for="fullname">Patient Full Name:</label>
  <input type="text" id="fullname" name="fullname" required><br><br>
 
  <label for="age">Patient  Age:</label>
  <input type="number" id="age" name="age" required><br><br>
  
   <label for="gender">Patient Gender:</label>
  <select name="gender" id="gender">
                        <option value="male">Male</option>
                        <option value="Female">Female</option>
                    </select><br><br>
    
  <label for="mobilenumber" required>Mobile Number:</label>
  <input type="number" id="mobilenumber" name="mobilenumber" required><br><br>
  
  <label for="doctor">Select Doctor:</label>
  <select name="doctor" id="doctor">
                        <option value="MS">MS</option>
                        <option value="MD">MD</option>
                        <option value="ENT">ENT</option>
                        <option value="ped">PED</option>
                    </select><br><br>
                    
     <label for="appointmentdate">Date of Appointment:</label>
  <input type="date" id="appointmentdate" name="appointmentdate" required><br><br>
  <input type="submit" value="Submit">
  </form>
  <br><br><br><br>
	
</body>
</html>
