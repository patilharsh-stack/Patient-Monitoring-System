<!DOCTYPE html>
<html xmlns:th="https://thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>All.html</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"></link>

</head>
<body>

  <h4 class="text-center mt-5 bold bg-danger text-white p-3"><span th:text="${title}"></span></h4>
  
  <div class="container">
          <div th:if=${!all.empty}>
         <table class="table table-striped table-responsive-md border">
         	<thead class="table-danger">
				<tr>
					<th>Serial Number</th>
					<th>Full Name</th>
					<th>Age</th>
					<th>Gender</th>
					<th>Mobile Number</th>
					<th>Doctor</th>
					<th>Appointment Date</th>
					</tr>
			</thead>
			<tbody>
			   <tr th:each="enq:${all}">
			     <td><span th:text="${enq.sn}"></span></td>
			     <td><span th:text="${enq.fullname}"></span></td>
			     <td><span th:text="${enq.age}"></span></td>
			     <td><span th:text="${enq.gender}"></span></td>
			     <td><span th:text="${enq.mobilenumber}"></span></td>
			     <td><span th:text="${enq.doctor}"></span></td>
			     <td><span th:text="${enq.appointmentdate}"></span></td>
			     <td><a th:href="@{/prescription}" class="btn btn-primary">Create Prescription</a>
			        &nbsp;&nbsp;&nbsp;</td>
			      </tr>			   
			</tbody>
         </table>
      </div>
  
  </div>
	

</body>
</html>
