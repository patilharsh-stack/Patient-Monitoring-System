<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
<link rel="stylesheet" href="prescription.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>
<body>

<h1><a href="/" class="icon"><i class="fa fa-home"></i></a>   PRESCRIPTION</h1>
<a href="/history" class="button-class">
                    <button>Check History</button> </a>
<form action="/savepresc" method="post">
 
  <label for="patientname">Patient Full  Name:</label>
  <input type="text" id="patientname" name="patientname" required><br><br>
 
  <label for="mobilenumber">Mobile Number:</label>
  <input type="number" id="mobilenumber" name="mobilenumber" required><br><br>
  
   <label for="gender">Gender:</label>
  <select name="gender" id="gender">
                        <option value="male">Male</option>
                        <option value="Female">Female</option>
                    </select><br><br>
  
   <label for="date">Date of Prescription:</label>
  <input type="date" id="prescdate" name="prescdate" required><br><br>
  
   <label for="morningtab">Morning Tablet:</label>
  <input type="text" id="morningtab" name="morningtab"><br><br>
  
   <label for="afternoontab">Afternoon Tablet:</label>
  <input type="text" id="afternoontab" name="afternoontab"><br><br>
  
   <label for="nighttab">Night Tablet:</label>
  <input type="text" id="nighttab" name="nighttab"><br><br>
  
  <label for="remark">Remark:</label>
  <input type="text" id="remark" name="remark" required><br><br>
  
  <input type="submit" value="Submit">
  
</form>
</body>
</html>
